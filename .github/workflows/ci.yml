name: CI Pipeline

on: [push, pull_request]

jobs:
  build-lint-test-typecheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pip-tools
      run: pip install pip-tools

    - name: Generate requirements.txt from pyproject.toml
      run: pip-compile --output-file requirements.txt pyproject.toml

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run linters (Ruff)
      run: |
        pip install ruff
        ruff check .

    - name: Run security checks (Bandit)
      run: |
        pip install bandit
        bandit -r src

    - name: Execute pytest
      run: pytest

    - name: Validate type checks with mypy
      run: |
        pip install mypy
        mypy lunar_tools_art.py prototypes/