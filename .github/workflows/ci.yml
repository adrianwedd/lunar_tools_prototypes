name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install bandit safety detect-secrets

    - name: Run Bandit security linter
      run: |
        bandit -r src/ prototypes/ -f json -o bandit-report.json || true
        bandit -r src/ prototypes/ -f txt

    - name: Run Safety dependency scanner
      run: |
        safety check --json --output safety-report.json || true
        safety check

    - name: Run detect-secrets
      run: |
        detect-secrets scan --all-files --baseline .secrets.baseline || true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Install package
      run: |
        pip install -e .

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src/lunar_tools_art --cov-report=xml --cov-report=html
      env:
        # Mock environment variables for testing
        OPENAI_API_KEY: "test-key"
        REPLICATE_API_TOKEN: "test-token"

    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports-py${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install quality tools
      run: |
        pip install black isort ruff mypy

    - name: Check code formatting with Black
      run: |
        black --check --diff src/ prototypes/ tests/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff src/ prototypes/ tests/

    - name: Run Ruff linter
      run: |
        ruff check src/ prototypes/ tests/

    - name: Run type checking with mypy
      run: |
        mypy src/lunar_tools_art/ --ignore-missing-imports --no-strict-optional
      continue-on-error: true  # Don't fail CI for type errors initially
